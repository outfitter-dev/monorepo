    <style>
      :root {
        --bg: #edf2ee;
        /* Base green (~Tailwind green-700 #15803d) as HSL components */
        --fg-h: 152; /* hue */
        --fg-s: 71%; /* saturation */
        --fg-l: 29%; /* lightness */
        /* Alphas for tinting */
        --a-strong: 1;
        --a-medium: 0.7;
        --a-dim: 0.5;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1a12;
          --fg-l: 80%;
          --a-dim: 0.75;
        }
      }
      :root { color-scheme: light dark; }
      html, body { height: 100%; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: hsla(var(--fg-h), var(--fg-s), var(--fg-l), var(--a-dim));
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        font-size: 16px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .word {
        letter-spacing: 0.02em;
        user-select: text;
        white-space: nowrap; /* keep it single-line by default */
        overflow-x: auto;
      }
      @media (max-width: 420px) {
        .word {
          white-space: normal;
        }
      }
      /* JSON tinting */
      .key { color: hsla(var(--fg-h), var(--fg-s), var(--fg-l), var(--a-strong)); }
      .p, .q { color: hsla(var(--fg-h), var(--fg-s), var(--fg-l), var(--a-dim)); }
      a.val, a.val:visited { color: hsla(var(--fg-h), var(--fg-s), var(--fg-l), var(--a-strong));
        text-decoration: none;
      }
      a.val:hover, a.val:focus-visible {
        color: hsla(var(--fg-h), var(--fg-s), var(--fg-l), var(--a-strong));
        text-decoration: underline;
        text-decoration-color: currentColor; /* underline matches tint */
        outline: 2px solid currentColor;
        outline-offset: 2px;
      }
      /* Icon sizing/alignment */
      .val .icon { width: 1.125em; height: 1.125em; vertical-align: -0.1em; } /* 25% larger */
      .xglyph { font-size: 1.125em; vertical-align: -0.08em; font-family: ui-sans-serif, system-ui, "Segoe UI Symbol", "Noto Sans Math", "Apple Symbols", sans-serif; user-select: none; }
      /* Visually hidden but accessible text */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      /* Selection: invert colors (dark green bg, light text) */
      ::selection { background: hsla(var(--fg-h), var(--fg-s), var(--fg-l), 1); color: var(--bg); text-shadow: none; }
      ::-moz-selection { background: hsla(var(--fg-h), var(--fg-s), var(--fg-l), 1); color: var(--bg); text-shadow: none; }
    </style>
